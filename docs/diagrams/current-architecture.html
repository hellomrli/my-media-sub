<!doctype html>
<html lang="zh-CN">
<head>

  <style>

    <!-- flow 1 -->
    <circle cx="70" cy="775" r="16" fill="#2f80ed"/><text class="badge" x="70" y="779" text-anchor="middle">1</text>
    <text class="flow-title" x="100" y="772">搜索资源</text>
