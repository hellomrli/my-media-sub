name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check frontend JavaScript
        run: |
          find static -type f -name '*.js' -print0 | sort -z | xargs -0 -n1 node --check
          node --test tests/frontend_*.test.js

      - name: Check OpenAPI route and compatibility contract
        run: python3 scripts/check-openapi.py

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --all-targets --all-features --locked

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --all --locked

      - name: Optional real Telegram sandbox smoke
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_SMOKE_SEND: "false"
        run: scripts/smoke-telegram.sh

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2023-0071

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke test release binary
        run: scripts/smoke-release.sh target/release/my-media-sub

      - name: Short stability soak
        env:
          SOAK_SECONDS: 10
        run: scripts/smoke-soak.sh target/release/my-media-sub

      - name: Install Chromium for browser smoke
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends chromium-browser || sudo apt-get install -y --no-install-recommends chromium
          command -v chromium-browser || command -v chromium || command -v google-chrome || command -v google-chrome-stable

      - name: Real browser 390px and PWA shell smoke
        run: scripts/smoke-browser.sh target/release/my-media-sub

      - name: Download v1.3.0 upgrade baseline
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSLO https://github.com/hellomrli/my-media-sub/releases/download/v1.3.0/my-media-sub-v1.3.0-linux-x86_64.tar.gz
          curl -fsSLO https://github.com/hellomrli/my-media-sub/releases/download/v1.3.0/my-media-sub-v1.3.0-linux-x86_64.tar.gz.sha256
          sha256sum -c my-media-sub-v1.3.0-linux-x86_64.tar.gz.sha256
          tar -xzf my-media-sub-v1.3.0-linux-x86_64.tar.gz

      - name: Smoke test v1.3.0 binary data upgrade
        run: |
          scripts/smoke-upgrade.sh \
            my-media-sub-v1.3.0-linux-x86_64/my-media-sub \
            my-media-sub-v1.3.0-linux-x86_64/static \
            target/release/my-media-sub static
