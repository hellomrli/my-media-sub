name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v1.3.0"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-x86_64:
    name: Build Linux x86_64 release
    # Keep the release binary compatible with the Debian bookworm runtime used by
    # the Docker image. ubuntu-latest can produce binaries requiring newer glibc.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Verify release tag matches Cargo version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          fi
          case "$TAG" in
            v*) ;;
            *) echo "Release tag must start with v: $TAG" >&2; exit 1 ;;
          esac
          CARGO_VERSION="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          if [ "${TAG#v}" != "$CARGO_VERSION" ]; then
            echo "Tag $TAG does not match Cargo version $CARGO_VERSION" >&2
            exit 1
          fi
          grep -Fqx "### $CARGO_VERSION" README.md || {
            echo "README.md is missing exact release heading: ### $CARGO_VERSION" >&2
            exit 1
          }
          if [ ! -s CHANGELOG.md ]; then
            echo "Required release document is missing or empty: CHANGELOG.md" >&2
            exit 1
          fi
          grep -Fqx "## $CARGO_VERSION" CHANGELOG.md || {
            echo "CHANGELOG.md is missing exact version heading: ## $CARGO_VERSION" >&2
            exit 1
          }
          if [ ! -s "docs/upgrade-v${CARGO_VERSION}.md" ]; then
            echo "Required release document is missing or empty: docs/upgrade-v${CARGO_VERSION}.md" >&2
            exit 1
          fi

      - name: Check frontend JavaScript
        run: |
          find static -type f -name '*.js' -print0 | sort -z | xargs -0 -n1 node --check
          node --test tests/frontend_*.test.js

      - name: Check OpenAPI route and compatibility contract
        run: python3 scripts/check-openapi.py

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --all-targets --all-features --locked

      - name: Run clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --all --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Smoke test release binary
        run: scripts/smoke-release.sh target/release/my-media-sub

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          fi
          DIST="my-media-sub-${VERSION}-linux-x86_64"
          mkdir -p "dist/${DIST}"
          cp target/release/my-media-sub "dist/${DIST}/"
          cp -r static "dist/${DIST}/static"
          cp -r docs "dist/${DIST}/docs"
          cp README.md "dist/${DIST}/"
          cp CHANGELOG.md "dist/${DIST}/"
          tar -C dist -czf "${DIST}.tar.gz" "${DIST}"
          sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"
          echo "archive=${DIST}.tar.gz" >> "$GITHUB_ENV"
          echo "checksum=${DIST}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          fi
          VERSION="${VERSION#v}"
          awk -v version="$VERSION" '
            $0 == "### " version { capture = 1; next }
            capture && /^### / { exit }
            capture { print }
          ' README.md | sed '/^[[:space:]]*$/d' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "README.md 中没有找到版本 ${VERSION} 的更新内容" >&2
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release-notes.md
          make_latest: true
          files: |
            ${{ env.archive }}
            ${{ env.checksum }}
