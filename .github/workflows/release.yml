name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.7.10"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  linux-x86_64:
    name: Build Linux x86_64 release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          fi
          DIST="my-media-sub-${VERSION}-linux-x86_64"
          mkdir -p "dist/${DIST}"
          cp target/release/my-media-sub "dist/${DIST}/"
          cp -r static "dist/${DIST}/static"
          cp README.md DOCKER.md "dist/${DIST}/"
          tar -C dist -czf "${DIST}.tar.gz" "${DIST}"
          sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"
          echo "archive=${DIST}.tar.gz" >> "$GITHUB_ENV"
          echo "checksum=${DIST}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          make_latest: true
          files: |
            ${{ env.archive }}
            ${{ env.checksum }}
