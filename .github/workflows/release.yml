name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.7.10"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-x86_64:
    name: Build Linux x86_64 release
    # Keep the release binary compatible with the Debian bookworm runtime used by
    # the Docker image. ubuntu-latest can produce binaries requiring newer glibc.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          fi
          DIST="my-media-sub-${VERSION}-linux-x86_64"
          mkdir -p "dist/${DIST}"
          cp target/release/my-media-sub "dist/${DIST}/"
          cp -r static "dist/${DIST}/static"
          cp README.md "dist/${DIST}/"
          tar -C dist -czf "${DIST}.tar.gz" "${DIST}"
          sha256sum "${DIST}.tar.gz" > "${DIST}.tar.gz.sha256"
          echo "archive=${DIST}.tar.gz" >> "$GITHUB_ENV"
          echo "checksum=${DIST}.tar.gz.sha256" >> "$GITHUB_ENV"

      - name: Prepare release notes
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          fi
          VERSION="${VERSION#v}"
          awk -v version="$VERSION" '
            $0 == "### " version {capture=1; next}
            capture && /^## / {exit}
            capture && /^### / {exit}
            capture {print}
          ' README.md | sed '/^[[:space:]]*$/d' > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "README.md 中没有找到版本 ${VERSION} 的更新内容" >&2
            exit 1
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: release-notes.md
          make_latest: true
          files: |
            ${{ env.archive }}
            ${{ env.checksum }}
