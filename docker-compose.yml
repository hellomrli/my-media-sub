services:
  my-media-sub:
    image: ghcr.io/hellomrli/my-media-sub:1.0.3
    # 如需本地源码构建，取消下面两行注释并注释 image。
    # build:
    #   context: .
    container_name: my-media-sub
    restart: unless-stopped
    ports:
      - "56001:56001"
    volumes:
      # 数据持久化
      - ./data:/app/data
    environment:
      # 基础服务配置
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=56001
      - SERVER_USERNAME=admin
      - SERVER_PASSWORD=replace-with-a-strong-password
      - ONLINE_UPDATE_ENABLED=true
      - TZ=Asia/Shanghai

      # 数据目录
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:56001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - media-sub-network

networks:
  media-sub-network:
    driver: bridge
