services:
  my-media-sub:
    image: ghcr.io/hellomrli/my-media-sub:latest
    # 如需本地源码构建，取消下面两行注释并注释 image。
    # build:
    #   context: .
    container_name: my-media-sub
    restart: unless-stopped
    ports:
      - "56001:56001"
    volumes:
      # 数据持久化
      - ./data:/app/data
    environment:
      # 基础服务配置
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=56001
      - SERVER_USERNAME=${SERVER_USERNAME:-admin}
      # 凭据从 .env 读取（参见 .env.example），不要写死在 compose 文件里。
      - SERVER_PASSWORD=${SERVER_PASSWORD:?set SERVER_PASSWORD in .env}
      - TZ=${TZ:-Asia/Shanghai}

      # 数据目录
      - DATA_DIR=/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:56001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - media-sub-network

networks:
  media-sub-network:
    driver: bridge
