<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>媒体订阅管理系统</title>
  <meta name="theme-color" content="#4f46e5">
  <meta name="application-name" content="MEDIA/SUB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.webmanifest" crossorigin="use-credentials">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 32 32%27%3E%3Crect width=%2732%27 height=%2732%27 rx=%278%27 fill=%27%234f46e5%27/%3E%3Cpath d=%27M8 9h16v14H8zm4-4v22m8-22v22%27 fill=%27none%27 stroke=%27white%27 stroke-width=%272%27/%3E%3C/svg%3E">
  <script src="js/theme-init.js?v=2.2.11"></script>
  <link rel="stylesheet" href="styles.css?v=2.2.11">
  <script defer src="vendor/alpine.min.js?v=2.2.11"></script>

<body class="bg-app text-text/90 min-h-screen" x-data="app()" x-cloak>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer" aria-live="polite" aria-atomic="true"></div>
  <div x-show="uiBusy" role="status" aria-live="polite" class="fixed inset-x-0 top-0 z-[90] h-1 overflow-hidden bg-primary/20"><span class="block h-full w-1/3 animate-pulse bg-primary"></span><span class="sr-only">正在加载</span></div>
  <div x-show="uiError" role="alert" class="fixed inset-x-3 top-3 z-[70] mx-auto max-w-3xl rounded-xl border border-danger/40 bg-surface p-4 shadow-xl">
    <div class="flex items-start justify-between gap-3"><div><strong class="text-danger">页面遇到错误</strong><p class="mt-1 text-sm text-muted" x-text="uiError"></p></div><div class="flex gap-2"><button @click="copyText(uiError)" class="btn-secondary px-3 py-2 text-sm">复制</button><button @click="uiError=''" class="btn-primary px-3 py-2 text-sm">关闭</button></div></div>
  </div>

  <div class="app-shell lg:flex" :aria-busy="uiBusy">
