        <!-- 订阅管理页面 -->
        <div x-show="currentTab === 'subscriptions'" class="page-stack">
          <div x-show="!selectedSubscriptionId" class="page-stack">
          <div class="app-panel p-4 space-y-3">
            <div class="toolbar-panel">
              <div>
                <h3 class="section-title">订阅列表</h3>
                <p class="text-sm text-muted/75 mt-1">按状态、进度和最近检查时间快速扫描。</p>
              </div>
              <div class="control-row">
                <button @click="checkAllSubscriptions()" :disabled="checkingAllSubscriptions" class="btn-secondary px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-2 disabled:opacity-50">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v6h6M20 20v-6h-6M5 19A9 9 0 0019 5M19 5h-5M5 19h5" /></svg>
                  <span x-show="!checkingAllSubscriptions">批量检查</span>
                  <span x-show="checkingAllSubscriptions">检查中</span>
                </button>
                <button @click="scrapeAllSubscriptionMetadata()" :disabled="scrapingAllMetadata" class="btn-secondary px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-2 disabled:opacity-50">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v6h6m14 10v-6h-6M5 19A9 9 0 0019 5m0 0h-5" /></svg>
                  <span x-show="!scrapingAllMetadata">刷新元数据</span>
                  <span x-show="scrapingAllMetadata">提交中</span>
                </button>
                <button @click="openBlankSubscriptionDialog()" class="btn-primary px-4 py-2 rounded-lg transition-colors flex items-center justify-center gap-2">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                  添加订阅
                </button>
              </div>
            </div>
            <div class="flex flex-col gap-2 lg:flex-row lg:items-center lg:justify-between">
              <div class="segmented-control">
                <template x-for="tab in subscriptionStatusTabs" :key="tab.id">
                  <button @click="setSubscriptionStatusTab(tab.id)" :class="subscriptionStatusTab === tab.id ? 'btn-primary' : 'btn-secondary'" class="px-3 py-2 rounded-lg text-sm transition-colors">
                    <span x-text="tab.name"></span>
                    <span class="ml-1 tabular-nums" x-text="subscriptionStatusCount(tab.id)"></span>
                  </button>
                </template>
              </div>
              <div class="flex flex-wrap items-center gap-2">
                <label x-show="filteredSubscriptions.length" class="flex items-center gap-2 px-2 text-sm"><input type="checkbox" :checked="allVisibleSubscriptionsSelected" @change="toggleAllVisibleSubscriptions()" />选择当前显示</label>
                <div class="segmented-control">
                  <button @click="setSubscriptionViewMode('table')" :class="subscriptionViewMode === 'table' ? 'btn-primary' : 'btn-secondary'" class="px-3 py-2 rounded-lg text-sm">表格</button>
                  <button @click="setSubscriptionViewMode('poster')" :class="subscriptionViewMode === 'poster' ? 'btn-primary' : 'btn-secondary'" class="px-3 py-2 rounded-lg text-sm">海报墙</button>
                </div>
              </div>
            </div>
            <div x-show="selectedSubscriptionIds.length > 0" class="flex flex-wrap items-center gap-2 border-t border-border pt-2">
              <span class="text-xs text-muted" x-text="selectedSubscriptionIds.length + ' 个已选 · 显示 ' + visibleFilteredSubscriptions.length + '/' + filteredSubscriptions.length"></span>
              <button @click="batchCheckSelectedSubscriptions()" :disabled="subscriptionBatchLoading" class="btn-secondary px-3 py-2 text-sm disabled:opacity-40">检查所选</button>
              <button @click="batchDeleteSelectedSubscriptions()" :disabled="subscriptionBatchLoading" class="btn-danger px-3 py-2 text-sm disabled:opacity-40">删除所选</button>
              <button @click="selectedSubscriptionIds = []" class="btn-secondary px-3 py-2 text-sm">取消选择</button>
            </div>
          </div>
          <template x-if="subscriptionViewMode === 'table'">
          <div class="data-table">
            <div class="data-table-scroll">
              <div class="data-table-head grid-cols-[minmax(300px,1.8fr)_88px_86px_150px_90px_130px_150px] px-3">
                <div>订阅</div>
                <div>类型</div>
                <div>状态</div>
                <div>进度</div>
                <div>评分</div>
                <div>最近检查</div>
                <div class="text-right">操作</div>
              </div>
              <template x-for="(sub, subIndex) in visibleFilteredSubscriptions" :key="'subscription-' + (sub.id || 'missing') + '-' + subIndex">
                <div>
                  <div class="data-table-row grid-cols-[minmax(300px,1.8fr)_88px_86px_150px_90px_130px_150px] px-3">
                    <div @click="openSubscriptionDetail(sub)" @keydown.enter.prevent="openSubscriptionDetail(sub)" tabindex="0" role="button" class="flex min-w-0 items-center gap-2 cursor-pointer">
                      <input type="checkbox" :checked="selectedSubscriptionIds.includes(sub.id)" @click.stop="toggleSubscriptionSelection(sub.id)" @keydown.space.stop.prevent="toggleSubscriptionSelection(sub.id)" :aria-label="'选择订阅 ' + subscriptionDisplayTitle(sub)" />
                      <div class="h-11 w-8 shrink-0 overflow-hidden rounded border border-border bg-surface-2 grid place-items-center">
                        <img x-show="subscriptionPoster(sub)" :src="subscriptionPoster(sub)" alt="" class="h-full w-full object-cover" @error="handleRemoteImageError($event)" @load="handleRemoteImageLoad($event)" />
                        <span x-show="!subscriptionPoster(sub)" class="text-[10px] text-muted/60">N/A</span>
                      </div>
                      <div class="min-w-0">
                        <div class="truncate text-sm font-medium text-text" x-text="subscriptionDisplayTitle(sub)"></div>
                        <div class="truncate text-xs text-muted/75" x-text="subscriptionSubtitle(sub)"></div>
                      </div>
                    </div>
                    <div><span class="badge badge-primary" x-text="mediaTypeLabel(sub.media_type)"></span></div>
                    <div><span :class="subscriptionStatusBadgeClass(sub)" x-text="subscriptionStatusLabel(sub)"></span></div>
                    <div class="space-y-1">
                      <div class="progress-inline"><span :style="'width:' + subscriptionProgressPercent(sub) + '%'"></span></div>
                      <div class="text-xs text-muted/75 tabular-nums" x-text="sub.media_type !== 'movie' ? subscriptionProgressLabel(sub) : '-'"></div>
                    </div>
                    <div><span class="badge badge-muted" x-text="subscriptionRatingLabel(sub)"></span></div>
                    <div class="text-xs text-muted/75" x-text="formatTime(sub.last_checked_at)"></div>
                    <div class="flex flex-wrap justify-end gap-1">
                      <button @click="checkSubscription(sub.id)" class="btn-secondary px-2 py-1 rounded text-xs transition-colors">检查</button>
                      <button @click="toggleSubscriptionActionMenu(sub.id)" class="btn-secondary px-2 py-1 rounded text-xs transition-colors">更多</button>
                    </div>
                  </div>
                  <div x-show="subscriptionActionMenuId === sub.id" class="border-b border-border bg-app/45 px-3 py-2">
                    <div class="flex flex-wrap justify-end gap-2">
                      <template x-for="action in subscriptionMenuActions()" :key="action.id">
                        <button @click="runSubscriptionMenuAction(action.id, sub)" :class="action.danger ? 'btn-danger' : 'btn-secondary'" class="px-3 py-1 rounded text-xs transition-colors" x-text="action.label"></button>
                      </template>
                    </div>
                  </div>
                  <div x-show="sub.status === 'invalid' && sub.last_error" class="border-b border-border bg-danger/5 px-3 py-2 text-xs text-danger break-all" x-text="'失效原因：' + sub.last_error"></div>
                </div>
              </template>
            </div>
          </div>
          </template>
          <template x-if="subscriptionViewMode === 'poster'">
          <div class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-4 2xl:grid-cols-6">
            <template x-for="(sub, subIndex) in visibleFilteredSubscriptions" :key="'subscription-' + (sub.id || 'missing') + '-' + subIndex">
              <div class="app-panel relative overflow-hidden hover:border-primary transition-colors">
                <input type="checkbox" :checked="selectedSubscriptionIds.includes(sub.id)" @change="toggleSubscriptionSelection(sub.id)" :aria-label="'选择订阅 ' + subscriptionDisplayTitle(sub)" class="absolute left-2 top-2 z-10 h-5 w-5" />
                <button @click="openSubscriptionDetail(sub)" class="block w-full text-left">
                  <div class="aspect-[2/3] bg-app grid place-items-center overflow-hidden border-b border-border">
                    <img x-show="subscriptionPoster(sub)" :src="subscriptionPoster(sub)" alt="" class="h-full w-full object-cover" @error="handleRemoteImageError($event)" @load="handleRemoteImageLoad($event)" />
                    <div x-show="!subscriptionPoster(sub)" class="px-3 text-center text-xs text-muted/75">暂无海报</div>
                  </div>
                </button>
                <div class="p-3 space-y-2">
                  <div class="flex items-start justify-between gap-2">
                    <div class="min-w-0">
                      <div class="truncate text-sm font-semibold text-text" x-text="subscriptionDisplayTitle(sub)"></div>
                      <div class="truncate text-xs text-muted/75" x-text="subscriptionSubtitle(sub)"></div>
                    </div>
                    <span :class="subscriptionStatusBadgeClass(sub)" x-text="subscriptionStatusLabel(sub)"></span>
                  </div>
                  <div class="flex flex-wrap gap-1.5">
                    <span class="badge badge-primary" x-text="mediaTypeLabel(sub.media_type)"></span>
                    <span class="badge badge-muted" x-text="subscriptionRatingLabel(sub)"></span>
                    <span x-show="sub.media_type !== 'movie'" class="badge badge-muted" x-text="subscriptionSeasonLabel(sub)"></span>
                  </div>
                  <div x-show="sub.media_type !== 'movie'" class="space-y-1">
                    <div class="progress-inline"><span :style="'width:' + subscriptionProgressPercent(sub) + '%'"></span></div>
                    <div class="flex items-center justify-between gap-2 text-xs text-muted/75">
                      <span x-text="subscriptionProgressLabel(sub)"></span>
                      <span x-text="formatTime(sub.last_checked_at)"></span>
                    </div>
                  </div>
                  <div x-show="sub.status === 'invalid' && sub.last_error" class="line-clamp-2 text-xs text-danger" x-text="sub.last_error"></div>
                  <div class="grid grid-cols-2 gap-1">
                    <button @click="checkSubscription(sub.id)" class="btn-secondary px-2 py-1 rounded text-xs transition-colors">检查</button>
                    <button @click="toggleSubscriptionActionMenu(sub.id)" class="btn-secondary px-2 py-1 rounded text-xs transition-colors">更多</button>
                  </div>
                  <div x-show="subscriptionActionMenuId === sub.id" class="grid grid-cols-2 gap-1 border-t border-border pt-2">
                    <template x-for="action in subscriptionMenuActions()" :key="action.id">
                      <button @click="runSubscriptionMenuAction(action.id, sub)" :class="action.danger ? 'btn-danger' : 'btn-secondary'" class="px-2 py-1 rounded text-xs transition-colors" x-text="action.short"></button>
                    </template>
                  </div>
                </div>
              </div>
            </template>
          </div>
          </template>
          <div x-show="hasMoreSubscriptions" class="flex justify-center"><button @click="subscriptionVisibleLimit += 100" class="btn-secondary px-5 py-2">加载更多订阅</button></div>
          <div x-show="subscriptions.length === 0" class="app-panel empty-state">暂无订阅</div>
          <div x-show="subscriptions.length > 0 && filteredSubscriptions.length === 0" class="app-panel empty-state" x-text="'暂无' + subscriptionStatusLabel(subscriptionStatusTab) + '订阅'"></div>
          </div>
