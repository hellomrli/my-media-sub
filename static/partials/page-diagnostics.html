        <!-- 系统诊断与备份 -->
        <div x-show="currentTab === 'diagnostics'" class="page-stack">
          <section class="page-header app-panel p-5">
            <div><p class="section-kicker">Operations</p><h2>系统诊断与备份</h2><p>脱敏运行状态、指标、完整 DATA_DIR 备份与安全恢复。</p></div>
            <div class="flex flex-wrap gap-2"><button @click="loadDiagnostics()" class="btn-secondary">刷新</button><button @click="copyDiagnostics()" class="btn-secondary">复制诊断</button><button @click="exportDiagnostics()" class="btn-secondary">导出诊断包</button><button @click="exportBackup()" class="btn-primary">下载完整备份</button></div>
          </section>
          <template x-if="diagnostics">
            <div class="space-y-4">
              <div class="grid grid-cols-2 lg:grid-cols-4 gap-3">
                <div class="app-panel p-4"><span class="text-xs text-muted">版本 / Schema</span><strong class="block mt-2" x-text="diagnostics.version + ' / v' + diagnostics.schema_version"></strong></div>
                <div class="app-panel p-4"><span class="text-xs text-muted">DATA_DIR</span><strong class="block mt-2" x-text="diagnosticBytes(diagnostics.data.total_bytes)"></strong></div>
                <div class="app-panel p-4"><span class="text-xs text-muted">任务队列</span><strong class="block mt-2" :class="diagnostics.queue.backlog_warning ? 'text-warning' : ''" x-text="diagnostics.queue.queued + ' 排队 / ' + diagnostics.queue.running + ' 运行'"></strong><small class="text-muted" x-text="diagnostics.queue.archived + ' 已归档' + (diagnostics.queue.maintenance_mode ? ' · 维护模式' : '')"></small></div>
                <div class="app-panel p-4"><span class="text-xs text-muted">密码风险</span><strong class="block mt-2" :class="diagnostics.security.default_password_risk ? 'text-danger' : 'text-success'" x-text="diagnostics.security.password_strength"></strong></div>
              </div>
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <section class="app-panel p-5 space-y-3"><h3 class="section-title">运行状态</h3>
                  <div class="text-sm text-muted space-y-2"><p>订阅：<strong x-text="diagnostics.data.subscriptions"></strong> · 通知：<strong x-text="diagnostics.data.notifications"></strong> · 自动化事件：<strong x-text="diagnostics.data.automation_events"></strong></p><p>订阅调度：<strong x-text="diagnostics.schedulers.subscription_running ? '运行中' : '未运行'"></strong> · 签到调度：<strong x-text="diagnostics.schedulers.quark_signin_running ? '运行中' : '未运行'"></strong></p><p>检查耗时累计：<strong x-text="diagnostics.metrics.subscription_check_duration_ms_total + ' ms'"></strong> · 转存耗时累计：<strong x-text="diagnostics.metrics.transfer_duration_ms_total + ' ms'"></strong></p></div>
                </section>
                <section class="app-panel p-5 space-y-3" x-show="diagnostics.telegram_bot"><div class="flex items-center justify-between gap-3"><h3 class="section-title">Telegram Bot</h3><span class="text-xs" :class="diagnostics.telegram_bot.status === 'error' || diagnostics.telegram_bot.status === 'misconfigured' ? 'text-danger' : 'text-success'" x-text="diagnostics.telegram_bot.status"></span></div><div class="text-xs text-muted space-y-2"><p>模式：<strong x-text="diagnostics.telegram_bot.mode"></strong> · 最近 Update：<strong x-text="diagnostics.telegram_bot.last_update_at || '无'"></strong></p><p>审计：<strong x-text="diagnostics.telegram_bot.audit_count"></strong> · 待确认：<strong x-text="diagnostics.telegram_bot.pending_confirmations"></strong> · 去重：<strong x-text="diagnostics.telegram_bot.deduplicated_updates"></strong> · 限流：<strong x-text="diagnostics.telegram_bot.rate_limited_updates"></strong></p><p>最近错误：<strong class="break-all" x-text="diagnostics.telegram_bot.last_error || '无'"></strong></p><p class="text-muted">完整脱敏审计可通过 <code>GET /api/telegram/audits</code> 获取。</p></div></section>
                <section class="app-panel p-5 space-y-3"><h3 class="section-title">服务器备份</h3><p class="text-sm text-muted">保留 <span x-text="diagnostics.backups.retention"></span> 份，当前 <span x-text="storedBackups.length"></span> 份 / <span x-text="diagnosticBytes(diagnostics.backups.total_bytes)"></span></p><p class="text-xs text-muted">外部复制：<strong x-text="diagnostics.backups.external_copy_configured ? '已配置' : '未配置'"></strong> · 定期验证：<strong x-text="diagnostics.backups.verification_interval_seconds ? diagnostics.backups.verification_interval_seconds / 3600 + ' 小时' : '关闭'"></strong></p><div x-show="backupVerification" class="app-panel-soft p-3 text-xs"><strong :class="backupVerification && backupVerification.status === 'passed' ? 'text-success' : 'text-danger'" x-text="backupVerification && backupVerification.status === 'passed' ? '最近验证通过' : '最近验证异常'"></strong><p class="text-muted mt-1" x-text="backupVerification ? backupVerification.backup + ' · 隔离恢复 ' + backupVerification.restored_files + ' 个文件' : ''"></p></div><div class="flex flex-wrap gap-2"><button @click="createStoredBackup()" class="btn-primary">立即创建服务器备份</button><button @click="verifyStoredBackup()" :disabled="backupVerifying || !storedBackups.length" class="btn-secondary" x-text="backupVerifying ? '验证中…' : '验证可恢复性'"></button></div><div class="max-h-32 overflow-auto text-xs text-muted"><template x-for="backup in storedBackups" :key="backup.name"><div class="flex justify-between py-1"><span x-text="backup.name"></span><span x-text="diagnosticBytes(backup.size)"></span></div></template></div></section>
              </div>
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <section class="app-panel p-5 space-y-3">
                  <div class="flex items-center justify-between gap-3"><h3 class="section-title">只读诊断建议</h3><span class="text-xs text-muted" x-text="(diagnostics.recommendations || []).length + ' 项'"></span></div>
                  <div class="space-y-2"><template x-for="(item, itemIndex) in diagnostics.recommendations || []" :key="'diagnostic-recommendation-' + (item.code || 'missing') + '-' + itemIndex"><div class="app-panel-soft p-3 text-sm"><strong :class="item.severity === 'error' ? 'text-danger' : (item.severity === 'warning' ? 'text-warning' : 'text-success')" x-text="item.summary"></strong><p class="text-xs text-muted mt-1" x-text="item.action"></p></div></template></div>
                </section>
                <section class="app-panel p-5 space-y-3"><h3 class="section-title">环境检查</h3>
                  <div class="text-sm text-muted space-y-2"><p>磁盘可用：<strong x-text="diagnosticBytes(diagnostics.environment.filesystem.available_bytes)"></strong> · 权限：<strong :class="diagnostics.environment.filesystem.readable && diagnostics.environment.filesystem.writable_hint ? 'text-success' : 'text-danger'" x-text="diagnostics.environment.filesystem.readable && diagnostics.environment.filesystem.writable_hint ? '读写正常' : '需检查'"></strong></p><p>时区偏移：<strong :class="diagnostics.environment.timezone.matches_expected ? 'text-success' : 'text-warning'" x-text="diagnostics.environment.timezone.local_offset_seconds / 3600 + ' 小时'"></strong></p><p>DNS：<strong x-text="(diagnostics.environment.dns || []).filter(item => item.status === 'ok').length + '/' + (diagnostics.environment.dns || []).length + ' 正常'"></strong></p></div>
                  <div class="max-h-36 overflow-auto space-y-1 text-xs text-muted"><template x-for="(store, storeIndex) in diagnostics.environment.data_consistency || []" :key="'diagnostic-store-' + (store.store || 'missing') + '-' + storeIndex"><div class="flex justify-between gap-3"><span x-text="store.store"></span><strong :class="store.status === 'ok' || store.status === 'missing' ? 'text-success' : 'text-danger'" x-text="store.status"></strong></div></template></div>
                </section>
              </div>
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <section class="app-panel p-5 space-y-3"><div class="flex items-center justify-between"><h3 class="section-title">可观测性</h3><a href="/metrics" target="_blank" rel="noopener" class="btn-secondary">Prometheus</a></div><p class="text-xs text-muted" x-text="'慢操作阈值 ' + diagnostics.metrics.slow_operation_threshold_ms + ' ms · 外部依赖 ' + Object.keys(diagnostics.metrics.external_dependencies || {}).length + ' 类'"></p><div class="flex flex-col sm:flex-row gap-2"><input x-model="logFilter" class="flex-1 px-3 py-2 bg-app border border-border rounded" aria-label="运行时日志过滤规则" placeholder="info,my_media_sub=debug" /><button @click="updateLogFilter()" :disabled="logFilterSaving" class="btn-primary" x-text="logFilterSaving ? '更新中…' : '应用日志级别'"></button></div><div class="space-y-1 text-xs text-muted"><template x-for="entry in Object.entries(diagnostics.metrics.external_dependencies || {})" :key="entry[0]"><p x-text="entry[0] + ': ' + entry[1].count + ' 次 / ' + entry[1].failures + ' 失败 / 最慢 ' + entry[1].duration_ms_max + ' ms'"></p></template></div></section>
                <section class="app-panel p-5 space-y-3"><h3 class="section-title">JSON Store I/O</h3><div class="space-y-2 text-xs text-muted"><template x-for="entry in Object.entries(diagnostics.metrics.store_io || {})" :key="entry[0]"><div class="app-panel-soft p-2"><div class="flex justify-between gap-3"><strong class="text-text" x-text="entry[0]"></strong><span x-text="diagnosticBytes(entry[1].current_bytes)"></span></div><div class="mt-1 flex flex-wrap gap-x-3"><span x-text="'读取 ' + entry[1].read_count + ' 次 / ' + diagnosticAverage(entry[1].parse_duration_us_total, entry[1].read_count)"></span><span x-text="'写入 ' + entry[1].write_count + ' 次 / ' + diagnosticAverage(entry[1].write_duration_us_total, entry[1].write_count)"></span></div></div></template><p x-show="!Object.keys(diagnostics.metrics.store_io || {}).length">当前进程尚无 Store I/O 样本</p></div></section>
                <section class="app-panel p-5 space-y-3"><div class="flex items-center justify-between gap-3"><h3 class="section-title">Store 生命周期 / SQLite 决策</h3><span class="text-xs" :class="storageLifecycle && storageLifecycle.growth_warning ? 'text-warning' : 'text-success'" x-text="storageLifecycle && storageLifecycle.growth_warning ? '增长预警' : '容量正常'"></span></div><p class="text-sm" :class="diagnostics.storage_decision.sqlite_required ? 'text-warning' : 'text-success'" x-text="diagnostics.storage_decision.sqlite_required ? '达到门槛：只启动迁移决策，不双写' : '未达到门槛：继续仅使用 JSON'"></p><div class="text-xs text-muted space-y-2"><template x-for="store in (storageLifecycle && storageLifecycle.stores) || []" :key="store.store"><div class="app-panel-soft p-2"><div class="flex justify-between gap-2"><strong x-text="store.store"></strong><span :class="store.warning ? 'text-warning' : ''" x-text="store.current_records + ' / ' + store.retention_limit + ' · 可清理 ' + store.would_remove"></span></div><template x-for="reason in store.warning_reasons || []" :key="reason"><p class="text-warning mt-1" x-text="reason"></p></template></div></template><p x-text="'后端 ' + diagnostics.storage_decision.runtime_backend + ' · 阶段 ' + diagnostics.storage_decision.migration_phase + ' · 双写 ' + (diagnostics.storage_decision.dual_write_active ? '开启' : '关闭')"></p></div><button @click="compactStorage()" :disabled="!storageLifecycle" class="btn-secondary">按预览清理 Store</button></section>
              </div>
            </div>
          </template>
          <section class="app-panel p-5 space-y-4"><div><h3 class="section-title">恢复数据</h3><p class="text-sm text-danger/80 mt-1">恢复会先创建当前快照，校验格式、Schema、哈希和路径，完成后必须重启。</p></div><input type="file" accept="application/json,.json" @change="selectBackupFile($event)" class="block w-full text-sm text-muted" />
            <template x-if="backupPreview"><div class="app-panel-soft p-4 text-sm"><p>有效备份：<strong x-text="backupPreview.file_count"></strong> 个文件，<strong x-text="diagnosticBytes(backupPreview.total_bytes)"></strong></p><p class="text-muted mt-1" x-text="'应用 ' + backupPreview.app_version + ' · Schema v' + backupPreview.schema_version"></p><div class="mt-3 grid grid-cols-1 sm:grid-cols-2 gap-2"><template x-for="(check, checkIndex) in backupPreview.checks || []" :key="'backup-check-' + (check.code || 'missing') + '-' + checkIndex"><div class="text-xs"><strong :class="check.status === 'passed' ? 'text-success' : 'text-warning'" x-text="check.label + ' · ' + check.status"></strong><p class="text-muted" x-text="check.message"></p></div></template></div></div></template>
            <div x-show="backupPreview" class="flex flex-col sm:flex-row gap-2"><input x-model="restoreConfirmation" class="flex-1 px-3 py-2 bg-app border border-danger/40 rounded" placeholder="输入 RESTORE DATA" /><button @click="restoreBackup()" class="btn-danger">确认恢复并要求重启</button></div>
          </section>
        </div>
