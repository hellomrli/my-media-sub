        <!-- 更新日历 -->
        <div x-show="currentTab === 'calendar'" class="page-stack calendar-page">
          <section class="calendar-toolbar app-panel">
            <div class="calendar-toolbar-main">
              <div>
                <span class="panel-eyebrow">MEDIA SCHEDULE</span>
                <h3 x-text="calendarRangeLabel()"></h3>
                <p>上海时区 · 自然周从周一开始 · 检查计划不等于播出计划</p>
              </div>
              <div class="calendar-nav-actions">
                <button @click="shiftCalendar(-1)" class="icon-button" aria-label="上一周期">←</button>
                <button @click="resetCalendarToday()" class="btn-secondary">今天</button>
                <button @click="shiftCalendar(1)" class="icon-button" aria-label="下一周期">→</button>
              </div>
            </div>
            <div class="calendar-toolbar-filters">
              <div class="segmented-control calendar-view-switch">
                <button @click="setCalendarView('week')" :class="calendarView === 'week' ? 'is-active' : ''">周</button>
                <button @click="setCalendarView('month')" :class="calendarView === 'month' ? 'is-active' : ''">月</button>
                <button @click="setCalendarView('list')" :class="calendarView === 'list' ? 'is-active' : ''">列表</button>
              </div>
              <select x-model="calendarStatusFilter" @change="loadCalendar()" class="app-select">
                <template x-for="option in calendarStatusOptions" :key="option.id"><option :value="option.id" x-text="option.name"></option></template>
              </select>
              <select x-model="calendarMediaFilter" @change="loadCalendar()" class="app-select">
                <option value="all">全部类型</option>
                <option value="series">剧集</option>
                <option value="anime">动画</option>
                <option value="movie">电影</option>
              </select>
            </div>
          </section>

          <div class="calendar-metrics">
            <div class="stat-tile"><span>日历项目</span><strong x-text="calendarSummary.total"></strong><small x-text="calendarSummary.subscriptions + ' 个订阅'"></small></div>
            <div class="stat-tile is-primary"><span>今日更新</span><strong x-text="calendarSummary.by_status.today || 0"></strong><small>按上海自然日</small></div>
            <div class="stat-tile is-warning"><span>待处理</span><strong x-text="(calendarSummary.by_status.aired_undiscovered || 0) + (calendarSummary.by_status.discovered_pending_transfer || 0) + (calendarSummary.by_status.transferred_pending_download || 0)"></strong><small>发现、转存与下载</small></div>
            <div class="stat-tile is-danger"><span>完结缺集</span><strong x-text="calendarSummary.by_status.completed_missing || 0"></strong><small>优先检查补集</small></div>
          </div>

          <div x-show="calendarLoading" class="calendar-state app-panel"><span class="loading-spinner"></span><strong>正在整理媒体排期</strong><small>合并元数据、转存与下载状态</small></div>
          <div x-show="!calendarLoading && calendarError" class="calendar-state app-panel is-error"><strong>日历加载失败</strong><small x-text="calendarError"></small><button @click="loadCalendar()" class="btn-secondary">重试</button></div>
          <div x-show="!calendarLoading && !calendarError && calendarItems.length === 0" class="calendar-state app-panel"><strong>当前范围没有日历项目</strong><small>可以切换日期范围、清除筛选，或为订阅补充元数据与手动排期。</small><button @click="calendarStatusFilter = 'all'; calendarMediaFilter = 'all'; loadCalendar()" class="btn-secondary">清除筛选</button></div>

          <section x-show="!calendarLoading && !calendarError && calendarItems.length > 0 && calendarView === 'week'" class="calendar-week-shell app-panel">
            <div class="calendar-week-grid">
              <template x-for="day in calendarWeekDays" :key="day.key">
                <div class="calendar-day-column" :class="day.isToday ? 'is-today' : ''">
                  <div class="calendar-day-head"><span x-text="calendarDateLabel(day.key, true)"></span><strong x-text="day.day"></strong><small x-text="day.items.length + ' 项'"></small></div>
                  <div class="calendar-day-items">
                    <template x-for="(item, itemIndex) in day.items" :key="'calendar-week-' + (item.id || 'missing') + '-' + itemIndex">
                      <article :class="calendarItemClass(item)">
                        <div class="calendar-item-head"><span class="calendar-status-dot"></span><small x-text="item.scheduled_time || '日期排期'"></small></div>
                        <button @click="openSubscriptionDetail(item.subscription_id)" class="calendar-item-title"><img x-show="item.thumbnail_url" :src="item.thumbnail_url" :alt="item.subscription_title + ' 缩略图'" loading="lazy" referrerpolicy="no-referrer" @error="handleRemoteImageError($event)" @load="handleRemoteImageLoad($event)" class="calendar-thumbnail is-week"><span><strong x-text="item.subscription_title"></strong><small x-text="item.episode ? 'S' + item.season + ' · E' + item.episode : '上映 / 开播'"></small></span></button>
                        <div class="calendar-item-badges"><span x-text="calendarStatusLabel(item.primary_status)"></span><span :class="'is-' + item.confidence" x-text="calendarConfidenceLabel(item.confidence)"></span></div>
                        <div class="calendar-item-actions"><button @click="openSubscriptionDetail(item.subscription_id)">详情</button><button x-show="item.actions.can_check" @click="runCalendarAction(item, false)">检查</button><button x-show="item.actions.can_repair" @click="runCalendarAction(item, true)" class="is-repair">补集</button></div>
                      </article>
                    </template>
                    <div x-show="day.items.length === 0" class="calendar-day-empty">暂无排期</div>
                  </div>
                </div>
              </template>
            </div>
          </section>

          <section x-show="!calendarLoading && !calendarError && calendarItems.length > 0 && calendarView === 'month'" class="calendar-month-shell app-panel">
            <div class="calendar-weekday-row"><span>周一</span><span>周二</span><span>周三</span><span>周四</span><span>周五</span><span>周六</span><span>周日</span></div>
            <div class="calendar-month-grid">
              <template x-for="day in calendarMonthCells" :key="day.key">
                <div class="calendar-month-day" :class="{'is-outside': !day.inMonth, 'is-today': day.isToday}">
                  <div class="calendar-month-date"><strong x-text="day.day"></strong><small x-show="day.items.length" x-text="day.items.length"></small></div>
                  <div class="calendar-month-items">
                    <template x-for="(item, itemIndex) in day.items.slice(0, 3)" :key="'calendar-month-' + (item.id || 'missing') + '-' + itemIndex">
                      <button @click="openSubscriptionDetail(item.subscription_id)" :class="calendarItemClass(item)"><img x-show="item.thumbnail_url" :src="item.thumbnail_url" :alt="item.subscription_title + ' 缩略图'" loading="lazy" referrerpolicy="no-referrer" @error="handleRemoteImageError($event)" @load="handleRemoteImageLoad($event)" class="calendar-thumbnail is-month"><span x-text="item.scheduled_time || '全天'"></span><strong x-text="item.subscription_title"></strong><small x-text="item.episode ? 'E' + item.episode : '上映'"></small></button>
                    </template>
                    <button x-show="day.items.length > 3" @click="setCalendarView('list')" class="calendar-month-more" x-text="'还有 ' + (day.items.length - 3) + ' 项'"></button>
                  </div>
                </div>
              </template>
            </div>
          </section>

          <section x-show="!calendarLoading && !calendarError && calendarItems.length > 0 && calendarView === 'list'" class="calendar-list-shell">
            <template x-for="group in calendarListGroups" :key="group.key">
              <div class="calendar-list-group app-panel" :class="group.key === 'unknown' ? 'is-unknown' : ''">
                <div class="calendar-list-date"><span x-text="calendarDateLabel(group.key, true)"></span><strong x-text="group.items.length + ' 项'"></strong></div>
                <div class="calendar-list-items">
                  <template x-for="(item, itemIndex) in group.items" :key="'calendar-list-' + (item.id || 'missing') + '-' + itemIndex">
                    <article :class="calendarItemClass(item)">
                      <div class="calendar-list-time"><strong x-text="item.scheduled_time || (item.scheduled_date ? '全天' : '—')"></strong><span x-text="calendarStatusLabel(item.primary_status)"></span></div>
                      <button @click="openSubscriptionDetail(item.subscription_id)" class="calendar-list-title"><img x-show="item.thumbnail_url" :src="item.thumbnail_url" :alt="item.subscription_title + ' 缩略图'" loading="lazy" referrerpolicy="no-referrer" @error="handleRemoteImageError($event)" @load="handleRemoteImageLoad($event)" class="calendar-thumbnail is-list"><span><strong x-text="item.subscription_title"></strong><small x-text="item.episode ? '第 ' + item.episode + ' 集' : (item.scheduled_date ? '上映 / 开播' : '等待补充排期')"></small></span></button>
                      <div class="calendar-list-source"><span x-text="calendarSourceLabel(item.schedule_source)"></span><small :class="'is-' + item.confidence" x-text="calendarConfidenceLabel(item.confidence)"></small></div>
                      <div class="calendar-list-actions"><button @click="openSubscriptionDetail(item.subscription_id)">详情</button><button x-show="item.actions.can_check" @click="runCalendarAction(item, false)">检查</button><button x-show="item.actions.can_repair" @click="runCalendarAction(item, true)" class="is-repair">检查并补集</button></div>
                    </article>
                  </template>
                </div>
              </div>
            </template>
          </section>
        </div>
