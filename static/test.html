<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-media-sub v0.4.0 测试面板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { margin-bottom: 10px; color: #4fc3f7; }
        .subtitle { color: #888; margin-bottom: 30px; }
        .card { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .card h2 { margin-bottom: 15px; color: #81c784; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; }
        .status-healthy { background: #4caf50; color: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin: 15px 0; }
        .stat { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; }
        .stat-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: 600; color: #4fc3f7; }
        input, button { padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); font-size: 14px; }
        input { background: rgba(255,255,255,0.05); color: #e0e0e0; flex: 1; }
        button { background: #4fc3f7; color: white; cursor: pointer; border: none; font-weight: 600; }
        button:hover { background: #29b6f6; }
        .search-form { display: flex; gap: 10px; margin: 15px 0; }
        .results { margin-top: 15px; }
        .result-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 8px; margin-bottom: 10px; }
        .result-title { font-weight: 600; color: #81c784; margin-bottom: 5px; }
        .result-meta { font-size: 12px; color: #888; }
        .loading { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 my-media-sub v0.4.0</h1>
        <p class="subtitle">新功能测试面板 - 异步搜索 + 智能去重</p>

        <div class="card">
            <h2>📊 服务器状态</h2>
            <span class="status-badge status-healthy" id="status">加载中...</span>
            <div class="grid" id="stats"></div>
        </div>

        <div class="card">
            <h2>🔍 异步搜索测试</h2>
            <div class="search-form">
                <input type="text" id="keyword" placeholder="输入关键词（例如：庆余年）" value="庆余年">
                <button onclick="search()">搜索</button>
            </div>
            <div class="results" id="results"></div>
        </div>
    </div>

    <script>
        async function loadStatus() {
            const res = await fetch('/health');
            const data = await res.json();
            document.getElementById('status').textContent = `${data.status} - v${data.version}`;
            const queue = data.queue;
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-label">队列状态</div><div class="stat-value">${queue.running ? '运行中' : '已停止'}</div></div>
                <div class="stat"><div class="stat-label">Worker 数量</div><div class="stat-value">${queue.workers}</div></div>
                <div class="stat"><div class="stat-label">已完成任务</div><div class="stat-value">${queue.completed}</div></div>
                <div class="stat"><div class="stat-label">失败任务</div><div class="stat-value">${queue.failed}</div></div>
            `;
        }

        async function search() {
            const keyword = document.getElementById('keyword').value;
            if (!keyword) return alert('请输入关键词');
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">🔄 搜索中... 正在并发查询 6 个搜索源</div>';
            
            try {
                const res = await fetch(`/api/test/search?keyword=${encodeURIComponent(keyword)}`, { method: 'POST' });
                const data = await res.json();
                
                if (data.results.length === 0) {
                    resultsDiv.innerHTML = '<div class="loading">未找到结果</div>';
                    return;
                }
                
                resultsDiv.innerHTML = `
                    <div style="margin-bottom: 10px; color: #888;">
                        📊 搜索统计：
                        原始结果 ${data.total_results} 个 → 
                        过滤失效 ${data.filtered_out} 个 → 
                        去重后 ${data.deduplicated_results} 个
                    </div>
                    ${data.results.map((r, i) => `
                        <div class="result-item">
                            <div class="result-title">${i+1}. ${r.note || r.title || '未命名'}</div>
                            <div class="result-meta">
                                画质: ${r.quality || '未知'} | 
                                来源: ${r.source || '未知'} | 
                                类型: ${r.cloud_name || r.cloud_type}
                            </div>
                        </div>
                    `).join('')}
                `;
            } catch (e) {
                resultsDiv.innerHTML = `<div class="loading">❌ 搜索失败: ${e.message}</div>`;
            }
        }

        loadStatus();
        setInterval(loadStatus, 5000);
    </script>
</body>
</html>
