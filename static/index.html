<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Sub - Rust Version</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status {
            display: inline-block;
            background: #10b981;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .features {
            margin: 2rem 0;
        }
        .feature {
            display: flex;
            align-items: center;
            margin: 1rem 0;
            padding: 1rem;
            background: #f9fafb;
            border-radius: 10px;
        }
        .feature-icon {
            font-size: 1.5rem;
            margin-right: 1rem;
        }
        .api-link {
            display: inline-block;
            margin-top: 2rem;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: transform 0.2s;
        }
        .api-link:hover {
            transform: translateY(-2px);
        }
        .stats {
            margin-top: 2rem;
            padding: 1.5rem;
            background: #fef3c7;
            border-radius: 10px;
            border-left: 4px solid #f59e0b;
        }
        .stats h3 {
            color: #92400e;
            margin-bottom: 0.5rem;
        }
        .stats ul {
            list-style: none;
            color: #78350f;
        }
        .stats li {
            margin: 0.3rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦀 My Media Sub</h1>
        <div class="status">✨ Rust Version Running</div>
        
        <p style="color: #6b7280; margin-bottom: 2rem;">
            高性能媒体订阅管理系统 - 使用 Rust 重写，性能提升 20-50 倍
        </p>

        <div class="features">
            <div class="feature">
                <span class="feature-icon">📚</span>
                <div>
                    <strong>订阅管理</strong>
                    <div style="font-size: 0.9rem; color: #6b7280;">创建和管理媒体订阅</div>
                </div>
            </div>
            <div class="feature">
                <span class="feature-icon">🔍</span>
                <div>
                    <strong>智能搜索</strong>
                    <div style="font-size: 0.9rem; color: #6b7280;">自动搜索和发现新资源</div>
                </div>
            </div>
            <div class="feature">
                <span class="feature-icon">☁️</span>
                <div>
                    <strong>夸克网盘</strong>
                    <div style="font-size: 0.9rem; color: #6b7280;">自动转存到夸克网盘</div>
                </div>
            </div>
            <div class="feature">
                <span class="feature-icon">⏰</span>
                <div>
                    <strong>定时任务</strong>
                    <div style="font-size: 0.9rem; color: #6b7280;">自动检查和转存</div>
                </div>
            </div>
        </div>

        <div class="stats">
            <h3>⚡ 性能优势</h3>
            <ul>
                <li>🚀 启动时间: &lt;0.1秒 (Python ~2秒)</li>
                <li>💾 内存占用: ~8MB (Python ~100MB)</li>
                <li>⚡ API 响应: &lt;1ms (Python ~50ms)</li>
            </ul>
        </div>

        <a href="/api/health" class="api-link">🔧 API 健康检查</a>
    </div>
</body>
</html>
