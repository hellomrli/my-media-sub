<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>媒体订阅管理</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- 自定义配置 -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            dark: {
                bg: '#0a0e17',
                card: '#0f1419',
                border: '#1f2937',
                hover: '#1a1f2e'
            }
          }
        }
      }
    }
  </script>

  <style>
    [x-cloak] { display: none !important; }

    /* 自定义滚动条 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #0f1419;
    }
    ::-webkit-scrollbar-thumb {
      background: #374151;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #4b5563;
    }
  </style>
</head>

<body class="bg-dark-bg text-gray-200 min-h-screen" x-data="app()" x-cloak>

  <!-- 主容器 -->
  <div class="flex h-screen overflow-hidden">

    <!-- 侧边栏 -->
    <aside class="w-64 bg-dark-card border-r border-dark-border flex flex-col">
      <!-- Logo -->
      <div class="p-6 border-b border-dark-border">
        <h1 class="text-xl font-bold text-white flex items-center gap-2">
          <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z" />
          </svg>
          媒体订阅
        </h1>
        <p class="text-xs text-gray-500 mt-1">v0.6.0 Rust Edition</p>
      </div>

      <!-- 导航菜单 -->
      <nav class="flex-1 p-4 space-y-1">
        <template x-for="tab in tabs" :key="tab.id">
          <button
            @click="currentTab = tab.id"
            :class="currentTab === tab.id ? 'bg-blue-600 text-white' : 'text-gray-400 hover:bg-dark-hover hover:text-white'"
            class="w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors duration-150"
          >
            <span x-html="tab.icon" class="w-5 h-5"></span>
            <span x-text="tab.name"></span>
          </button>
        </template>
      </nav>

      <!-- 底部状态 -->
      <div class="p-4 border-t border-dark-border">
        <div class="flex items-center justify-between text-xs text-gray-500">
          <span>订阅数</span>
          <span class="font-semibold text-blue-500" x-text="subscriptions.length"></span>
        </div>
        <div class="flex items-center justify-between text-xs text-gray-500 mt-2">
          <span>未读通知</span>
          <span class="font-semibold text-orange-500" x-text="unreadNotifications"></span>
        </div>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="flex-1 flex flex-col overflow-hidden">

      <!-- 顶部栏 -->
      <header class="bg-dark-card border-b border-dark-border px-6 py-4 flex items-center justify-between">
        <div>
          <h2 class="text-2xl font-bold text-white" x-text="tabs.find(t => t.id === currentTab)?.name"></h2>
          <p class="text-sm text-gray-500 mt-1" x-text="tabs.find(t => t.id === currentTab)?.description"></p>
        </div>

        <div class="flex items-center gap-3">
          <!-- 刷新按钮 -->
          <button @click="refresh()" class="px-4 py-2 bg-dark-hover hover:bg-gray-700 text-white rounded-lg transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
        </div>
      </header>

      <!-- 内容区 -->
      <div class="flex-1 overflow-y-auto p-6">

        <!-- 搜索页面 -->
        <div x-show="currentTab === 'search'" class="space-y-4">
          <div class="bg-dark-card rounded-lg p-6 border border-dark-border">
            <h3 class="text-lg font-semibold mb-4 text-white">资源搜索</h3>

            <div class="flex gap-3">
              <input
                type="text"
                x-model="searchQuery"
                @keyup.enter="search()"
                placeholder="输入影片名称..."
                class="flex-1 px-4 py-3 bg-dark-bg border border-dark-border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500"
              />
              <button
                @click="search()"
                :disabled="searching || !searchQuery"
                :class="searching ? 'opacity-50 cursor-not-allowed' : ''"
                class="px-6 py-3 bg-blue-600 hover:bg-blue-700 disabled:hover:bg-blue-600 text-white rounded-lg font-medium transition-colors"
              >
                <span x-show="!searching">搜索</span>
                <span x-show="searching">搜索中...</span>
              </button>
            </div>
          </div>

          <!-- 搜索结果 -->
          <div x-show="searchResults.length > 0" class="space-y-3">
            <template x-for="result in searchResults" :key="result.link">
              <div class="bg-dark-card rounded-lg p-4 border border-dark-border hover:border-blue-500 transition-colors">
                <div class="flex justify-between items-start">
                  <div class="flex-1">
                    <h4 class="text-white font-medium mb-2" x-text="result.title"></h4>
                    <div class="flex gap-4 text-sm text-gray-400">
                      <span x-text="result.cloud_type" class="px-2 py-1 bg-blue-600/20 text-blue-400 rounded"></span>
                      <span x-text="result.size"></span>
                    </div>
                  </div>
                  <button
                    @click="createSubscriptionFromSearch(result)"
                    class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm transition-colors"
                  >
                    订阅
                  </button>
                </div>
              </div>
            </template>
          </div>

          <div x-show="searchResults.length === 0 && searchQuery && !searching" class="text-center py-12 text-gray-500">
            未找到结果
          </div>
        </div>

        <!-- 订阅列表页面 -->
        <div x-show="currentTab === 'subscriptions'" class="space-y-4">

          <!-- 添加订阅按钮 -->
          <div class="flex justify-end">
            <button
              @click="showAddSubscription = true"
              class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors flex items-center gap-2"
            >
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
              添加订阅
            </button>
          </div>

          <!-- 订阅列表 -->
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <template x-for="sub in subscriptions" :key="sub.id">
              <div class="bg-dark-card rounded-lg p-5 border border-dark-border hover:border-blue-500 transition-colors">
                <div class="flex justify-between items-start mb-3">
                  <h4 class="text-white font-semibold text-lg" x-text="sub.name"></h4>
                  <span
                    :class="{
                      'bg-green-600/20 text-green-400': sub.status === 'active',
                      'bg-gray-600/20 text-gray-400': sub.status === 'completed',
                      'bg-red-600/20 text-red-400': sub.status === 'invalid'
                    }"
                    class="px-2 py-1 rounded text-xs font-medium"
                    x-text="sub.status"
                  ></span>
                </div>

                <div class="space-y-2 text-sm text-gray-400 mb-4">
                  <div class="flex items-center gap-2">
                    <span class="w-16">类型:</span>
                    <span x-text="sub.media_type" class="text-blue-400"></span>
                  </div>
                  <div class="flex items-center gap-2">
                    <span class="w-16">关键词:</span>
                    <span x-text="sub.keywords.join(', ')" class="text-gray-300"></span>
                  </div>
                  <div x-show="sub.latest_episode" class="flex items-center gap-2">
                    <span class="w-16">最新:</span>
                    <span x-text="'第' + sub.latest_episode + '集'" class="text-green-400"></span>
                  </div>
                </div>

                <div class="flex gap-2">
                  <button
                    @click="editSubscription(sub)"
                    class="flex-1 px-3 py-2 bg-dark-hover hover:bg-gray-700 text-white rounded transition-colors text-sm"
                  >
                    编辑
                  </button>
                  <button
                    @click="deleteSubscription(sub.id)"
                    class="px-3 py-2 bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white rounded transition-colors text-sm"
                  >
                    删除
                  </button>
                </div>
              </div>
            </template>
          </div>

          <div x-show="subscriptions.length === 0" class="text-center py-12 text-gray-500">
            暂无订阅，点击右上角添加
          </div>
        </div>

        <!-- 通知页面 -->
        <div x-show="currentTab === 'notifications'" class="space-y-4">

          <div class="flex justify-end gap-2">
            <button
              @click="markAllRead()"
              class="px-4 py-2 bg-dark-hover hover:bg-gray-700 text-white rounded-lg transition-colors text-sm"
            >
              全部已读
            </button>
            <button
              @click="clearNotifications()"
              class="px-4 py-2 bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white rounded-lg transition-colors text-sm"
            >
              清空通知
            </button>
          </div>

          <!-- 通知列表 -->
          <div class="space-y-3">
            <template x-for="notif in notifications" :key="notif.id">
              <div
                :class="!notif.read ? 'border-blue-500 bg-blue-600/5' : 'border-dark-border'"
                class="bg-dark-card rounded-lg p-4 border hover:border-blue-500 transition-colors"
              >
                <div class="flex justify-between items-start">
                  <div class="flex-1">
                    <h4 class="text-white font-medium mb-1" x-text="notif.title"></h4>
                    <p class="text-gray-400 text-sm mb-2" x-text="notif.message"></p>
                    <span class="text-xs text-gray-500" x-text="new Date(notif.time * 1000).toLocaleString()"></span>
                  </div>
                  <button
                    x-show="!notif.read"
                    @click="markRead(notif.id)"
                    class="ml-4 px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white rounded text-xs transition-colors"
                  >
                    标记已读
                  </button>
                </div>
              </div>
            </template>
          </div>

          <div x-show="notifications.length === 0" class="text-center py-12 text-gray-500">
            暂无通知
          </div>
        </div>

        <!-- 设置页面 -->
        <div x-show="currentTab === 'settings'" class="space-y-4">

          <div class="bg-dark-card rounded-lg p-6 border border-dark-border">
            <h3 class="text-lg font-semibold mb-4 text-white">夸克网盘配置</h3>

            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">夸克 Cookie</label>
                <input
                  type="text"
                  x-model="settings.quark_cookie"
                  placeholder="输入夸克网盘 Cookie..."
                  class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500"
                />
              </div>

              <div>
                <label class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
                  <input
                    type="checkbox"
                    x-model="settings.quark_save_enabled"
                    class="w-4 h-4 rounded border-dark-border bg-dark-bg text-blue-600 focus:ring-2 focus:ring-blue-500"
                  />
                  启用自动转存
                </label>
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">转存根目录</label>
                <input
                  type="text"
                  x-model="settings.quark_save_root"
                  placeholder="/媒体"
                  class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500"
                />
              </div>
            </div>
          </div>

          <div class="bg-dark-card rounded-lg p-6 border border-dark-border">
            <h3 class="text-lg font-semibold mb-4 text-white">Aria2 配置</h3>

            <div class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Aria2 RPC URL</label>
                <input
                  type="text"
                  x-model="settings.aria2_rpc_url"
                  placeholder="http://localhost:6800/jsonrpc"
                  class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500"
                />
              </div>

              <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Aria2 Token</label>
                <input
                  type="password"
                  x-model="settings.aria2_token"
                  placeholder="可选"
                  class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500"
                />
              </div>

              <div>
                <label class="flex items-center gap-2 text-sm text-gray-300 cursor-pointer">
                  <input
                    type="checkbox"
                    x-model="settings.aria2_enabled"
                    class="w-4 h-4 rounded border-dark-border bg-dark-bg text-blue-600 focus:ring-2 focus:ring-blue-500"
                  />
                  启用 Aria2 下载
                </label>
              </div>
            </div>
          </div>

          <div class="flex justify-end">
            <button
              @click="saveSettings()"
              class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium transition-colors"
            >
              保存设置
            </button>
          </div>
        </div>

      </div>
    </main>

  </div>

  <!-- 模态框：添加订阅 -->
  <div
    x-show="showAddSubscription"
    @click.self="showAddSubscription = false"
    class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-4 z-50"
    style="display: none;"
  >
    <div class="bg-dark-card rounded-xl p-6 max-w-md w-full border border-dark-border" @click.stop>
      <h3 class="text-xl font-bold text-white mb-4">添加订阅</h3>

      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">名称</label>
          <input
            type="text"
            x-model="newSubscription.name"
            placeholder="影片名称"
            class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">类型</label>
          <select
            x-model="newSubscription.media_type"
            class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white"
          >
            <option value="series">连续剧</option>
            <option value="movie">电影</option>
            <option value="anime">动漫</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">关键词（用空格分隔）</label>
          <input
            type="text"
            x-model="newSubscription.keywords"
            placeholder="龙珠 4K"
            class="w-full px-4 py-2 bg-dark-bg border border-dark-border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500"
          />
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button
          @click="showAddSubscription = false"
          class="flex-1 px-4 py-2 bg-dark-hover hover:bg-gray-700 text-white rounded-lg transition-colors"
        >
          取消
        </button>
        <button
          @click="addSubscription()"
          class="flex-1 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors"
        >
          添加
        </button>
      </div>
    </div>
  </div>

  <!-- Alpine.js 应用逻辑 -->
  <script>
    function app() {
      return {
        // 当前标签页
        currentTab: 'search',

        // 标签页配置
        tabs: [
          {
            id: 'search',
            name: '资源搜索',
            description: '搜索影视资源并添加订阅',
            icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>'
          },
          {
            id: 'subscriptions',
            name: '订阅管理',
            description: '管理你的媒体订阅',
            icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>'
          },
          {
            id: 'notifications',
            name: '通知中心',
            description: '查看系统通知和更新',
            icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>'
          },
          {
            id: 'settings',
            name: '系统设置',
            description: '配置夸克网盘和 Aria2',
            icon: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>'
          }
        ],

        // 搜索
        searchQuery: '',
        searching: false,
        searchResults: [],

        // 订阅
        subscriptions: [],
        showAddSubscription: false,
        newSubscription: {
          name: '',
          media_type: 'series',
          keywords: ''
        },

        // 通知
        notifications: [],

        // 设置
        settings: {
          quark_cookie: '',
          quark_save_enabled: false,
          quark_save_root: '',
          aria2_rpc_url: '',
          aria2_token: '',
          aria2_enabled: false
        },

        // 初始化
        async init() {
          console.log('🚀 应用初始化...');
          await this.loadSubscriptions();
          await this.loadNotifications();
          await this.loadSettings();
        },

        // 计算未读通知数
        get unreadNotifications() {
          return this.notifications.filter(n => !n.read).length;
        },

        // 刷新当前页面数据
        async refresh() {
          if (this.currentTab === 'subscriptions') {
            await this.loadSubscriptions();
          } else if (this.currentTab === 'notifications') {
            await this.loadNotifications();
          } else if (this.currentTab === 'settings') {
            await this.loadSettings();
          }
        },

        // ===== 搜索功能 =====
        async search() {
          if (!this.searchQuery.trim()) return;

          this.searching = true;
          this.searchResults = [];

          try {
            const response = await fetch(`/api/search?query=${encodeURIComponent(this.searchQuery)}`);
            const data = await response.json();

            if (data.results) {
              this.searchResults = data.results;
              this.showNotification('success', `找到 ${data.results.length} 个结果`);
            }
          } catch (error) {
            console.error('搜索失败:', error);
            this.showNotification('error', '搜索失败，请重试');
          } finally {
            this.searching = false;
          }
        },

        async createSubscriptionFromSearch(result) {
          this.newSubscription = {
            name: result.title,
            media_type: 'series',
            keywords: result.title
          };
          this.showAddSubscription = true;
        },

        // ===== 订阅管理 =====
        async loadSubscriptions() {
          try {
            const response = await fetch('/api/subscriptions');
            const data = await response.json();
            this.subscriptions = data.subscriptions || [];
          } catch (error) {
            console.error('加载订阅失败:', error);
          }
        },

        async addSubscription() {
          if (!this.newSubscription.name.trim()) {
            this.showNotification('error', '请输入订阅名称');
            return;
          }

          try {
            const keywords = this.newSubscription.keywords.trim().split(/\s+/);

            const response = await fetch('/api/subscriptions', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: this.newSubscription.name,
                media_type: this.newSubscription.media_type,
                keywords: keywords,
                status: 'active'
              })
            });

            if (response.ok) {
              this.showNotification('success', '订阅添加成功');
              this.showAddSubscription = false;
              this.newSubscription = { name: '', media_type: 'series', keywords: '' };
              await this.loadSubscriptions();
            } else {
              throw new Error('添加失败');
            }
          } catch (error) {
            console.error('添加订阅失败:', error);
            this.showNotification('error', '添加订阅失败');
          }
        },

        async deleteSubscription(id) {
          if (!confirm('确定要删除这个订阅吗？')) return;

          try {
            const response = await fetch(`/api/subscriptions/${id}`, {
              method: 'DELETE'
            });

            if (response.ok) {
              this.showNotification('success', '订阅已删除');
              await this.loadSubscriptions();
            }
          } catch (error) {
            console.error('删除订阅失败:', error);
            this.showNotification('error', '删除失败');
          }
        },

        editSubscription(sub) {
          this.newSubscription = {
            name: sub.name,
            media_type: sub.media_type,
            keywords: sub.keywords.join(' ')
          };
          this.showAddSubscription = true;
        },

        // ===== 通知管理 =====
        async loadNotifications() {
          try {
            const response = await fetch('/api/notifications');
            const data = await response.json();
            this.notifications = data.notifications || [];
          } catch (error) {
            console.error('加载通知失败:', error);
          }
        },

        async markRead(id) {
          try {
            const response = await fetch(`/api/notifications/${id}/read`, {
              method: 'POST'
            });

            if (response.ok) {
              await this.loadNotifications();
            }
          } catch (error) {
            console.error('标记已读失败:', error);
          }
        },

        async markAllRead() {
          try {
            const response = await fetch('/api/notifications/read-all', {
              method: 'POST'
            });

            if (response.ok) {
              this.showNotification('success', '全部标记为已读');
              await this.loadNotifications();
            }
          } catch (error) {
            console.error('标记全部已读失败:', error);
          }
        },

        async clearNotifications() {
          if (!confirm('确定要清空所有通知吗？')) return;

          try {
            const response = await fetch('/api/notifications', {
              method: 'DELETE'
            });

            if (response.ok) {
              this.showNotification('success', '通知已清空');
              await this.loadNotifications();
            }
          } catch (error) {
            console.error('清空通知失败:', error);
          }
        },

        // ===== 设置管理 =====
        async loadSettings() {
          try {
            const response = await fetch('/api/settings');
            const data = await response.json();
            this.settings = { ...this.settings, ...data };
          } catch (error) {
            console.error('加载设置失败:', error);
          }
        },

        async saveSettings() {
          try {
            const response = await fetch('/api/settings', {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(this.settings)
            });

            if (response.ok) {
              this.showNotification('success', '设置已保存');
            } else {
              throw new Error('保存失败');
            }
          } catch (error) {
            console.error('保存设置失败:', error);
            this.showNotification('error', '保存设置失败');
          }
        },

        // ===== 通知提示 =====
        showNotification(type, message) {
          // 简单的通知实现
          console.log(`[${type}] ${message}`);
          alert(message);
        }
      }
    }
  </script>

</body>
</html>
